<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f3f3;
}

.header{
    width:100%;
    height:90px;
    background:#8b0000;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:-30px;
}

.login-box{
    width:430px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.logo{
    width:150px;
    display:block;
    margin:0 auto;
}

h1{
    text-align:center;
    color:#8b0000;
    margin-top:10px;
    font-size:32px;
}

h3{
    text-align:center;
    color:gray;
    margin-bottom:25px;
    font-weight:normal;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:15px;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#8b0000;
}

button{
    width:100%;
    padding:13px;
    margin-top:20px;
    background:#8b0000;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#a00000;
}

.or{
    text-align:center;
    margin:20px 0;
    color:gray;
}

.login2{
    width:100%;
    background:white;
    color:#8b0000;
    border:2px solid #8b0000;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#555;
}
</style>

</head>
<body>

<div class="header"></div>

<div class="container">

<div class="login-box">

<img src="logo.png" class="logo">

<h1>ADHIPARASAKTHI</h1>
<h3>APEC Login</h3>

<label>Username</label>
<input type="text" placeholder="Enter your username">

<label>Password</label>
<input type="password" placeholder="Enter your password">

<div class="options">
<label><input type="checkbox" style="width:auto;"> Remember me</label>
<a href="#">Forgot Password?</a>
</div>

<button>Login</button>

<div class="or">OR</div>

<button class="login2">Login with APEC Account</button>

</div>

</div>

<div class="footer">
© 2025 Adhiparasakthi Engineering College. All Rights Reserved.
</div>

</body>
</html>
